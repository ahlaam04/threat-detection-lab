id: DET-004
name: Network Discovery via Netstat
status: production
author: Ton Nom
date: 2024-03-19

mitre:
  tactic: Discovery
  technique_id: T1049
  technique_name: System Network Connections Discovery
  url: https://attack.mitre.org/techniques/T1049/

description: >
  Detects netstat.exe usage for local port and connection
  reconnaissance. The flags -nao and LISTENING indicate
  an attacker mapping active connections and open ports
  before lateral movement.

data_sources:
  - WinEventLog Security EventCode 4688

spl_query: |
  index=botsv3 sourcetype="WinEventLog" EventCode=4688
  | eval process=lower(coalesce(Process_Name, process_name))
  | eval cmdline=lower(coalesce(Process_Command_Line, CommandLine))
  | where match(process, "netstat\.exe")
    OR (match(cmdline, "netstat")
    AND match(cmdline, "-nao|-an|listening"))
  | eval technique="T1049 - Network Connections Discovery"
  | eval tactic="Discovery"
  | eval severity="Medium"
  | table _time, host, Account_Name, process, cmdline, severity

findings_in_botsv3:
  detections: 78
  observation: >
    Netstat with -nao flags detected on multiple machines.
    Combined with WMIC reconnaissance (T1082), this confirms
    a systematic network discovery phase before lateral movement.

false_positives:
  - Network troubleshooting by administrators
  - Monitoring scripts

tuning:
  - Whitelist IT admin workstations
  - Add parent process filter for known monitoring tools

severity: medium
confidence: medium
alert_schedule: every 60 minutes